[[items]]
  title = "Strategy & Planning"
  description = "I kick off every project by developing a solid strategy and comprehensive plan. This involves understanding your business goals, target audience, and project requirements to lay the groundwork for success."
  icon = "/images/icons/icon-1.svg"
  color = "purple"

[[items]]
  title = "User Research"
  description = "In-depth research is key to uncovering valuable insights about your users and their needs. I conduct user interviews, analyze competitor landscapes, and gather data to inform the design process."
  icon = "/images/icons/icon-2.svg"
  color = "green"

[[items]]
  title = "Emphatize"
  description = "Understanding the user's perspective is crucial. I put myself in their shoes, empathizing with their goals, motivations, and pain points. This helps me design solutions that truly meet their needs."
  icon = "/images/icons/icon-heart.svg"
  color = "red"

[[items]]
  title = "Design"
  description = "Armed with research insights, I dive into the creative process. I sketch wireframes, create prototypes, and craft intuitive user interfaces that blend aesthetics with functionality. I focus on delivering a seamless and delightful user experience."
  icon = "/images/icons/icon-3.svg"
  color = "pink"
