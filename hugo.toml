baseURL = "https://valsevilla.design/"
locale = "en"
title = "Val Sevilla - Product Designer"

enableRobotsTXT = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.161.0"

[params]
  author = "Val Sevilla"
  description = "Product Designer specializing in user experience, research, and digital design"
  tagline = "UX / Product Designer"
  email = "hello@valsevilla.design"
  resumeUrl = "/images/cv-val-sevilla.pdf"
  formSubmitEndpoint = "https://formsubmit.co/deryssevilla@gmail.com"

  [params.hero]
    greeting = "heeyyy!"
    heading = "I'm Valentina, a product designer."
    subheading = "I'm passionate about creating experiences that truly resonate with people — through research, collaboration and a lot of care for the details."
    ctaText = "See my work"
    ctaLink = "#work"

  [params.about]
    yearsExperience = "5+"
    bio = "I'm a product designer who is passionate about creating meaningful digital experiences. With a background in UX research and UI design, I bring a user-centered approach to every project I work on."
    skills = ["Strategy & Planning", "User Research", "Empathy", "UX/UI Design", "Design Systems", "Prototyping"]

  [params.meta]
    ogImage = "/images/og-image.jpg"
    ogDescription = "Val Sevilla - Product Designer specializing in user experience and digital design"

[[menus.main]]
  name = "Work"
  url = "/#work"
  weight = 1

[[menus.main]]
  name = "About"
  url = "/#about"
  weight = 2

[[menus.main]]
  name = "Blog"
  url = "/#blog"
  weight = 3

[[menus.main]]
  name = "Let's talk"
  url = "/#contact"
  weight = 4
  [menus.main.params]
    cta = true

[markup.goldmark.renderer]
  unsafe = true
