{{ define "main" }}
  <div class="section">
    <div class="container">
      <h1>{{ .Title }}</h1>
      {{ .Content }}
      {{ range .Pages }}
        <article>
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
        </article>
      {{ end }}
    </div>
  </div>
{{ end }}
