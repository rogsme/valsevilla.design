<section id="contact" class="section contact">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <h2>Let's work together</h2>
        <p>Have a project in mind? Let's create something great together. Fill out the form and I'll get back to you as soon as possible.</p>
      </div>
      <form class="contact-form" action="{{ site.Params.formspreeEndpoint }}" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="btn btn-accent">Send message</button>
      </form>
    </div>
  </div>
</section>
