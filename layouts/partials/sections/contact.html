<section class="cta cta-contact" id="contact">
  <div class="wrap">
    <h2>Got a project in mind? <em>Let's get in touch.</em></h2>
    <p>Want to see my secret portfolio? 👀 My inbox is always open.</p>
    <form class="contact-form" action="{{ site.Params.formSubmitEndpoint }}" method="POST">
      <input type="hidden" name="_subject" value="New contact from valsevilla.design">
      <input type="hidden" name="_captcha" value="false">
      <input type="text" name="_honey" style="display:none">
      <div class="form-fields-grid">
        <input type="text" name="name" placeholder="What is your name *" required class="text-field">
        <input type="email" name="email" placeholder="Your email address *" required class="text-field">
        <textarea name="message" placeholder="Tell me about your project *" required class="text-field form-field-full"></textarea>
      </div>
      <button type="submit" class="btn sun">Say hello →</button>
    </form>
  </div>
</section>
