<section id="home" class="hero">
  <div class="container">
    <div class="hero-grid">
      <div class="hero-content">
        <div class="hero-badge">
          <span>👋</span>
          <span>{{ site.Params.hero.greeting }}</span>
        </div>
        <h1 class="hero-heading">{{ site.Params.hero.heading }}</h1>
        <p class="hero-description">{{ site.Params.hero.subheading }}</p>
        <a href="{{ site.Params.hero.ctaLink }}" class="btn btn-primary">{{ site.Params.hero.ctaText }}</a>
      </div>
      <div class="hero-image">
        <img src="/images/hero.png" alt="{{ site.Params.author }}">
      </div>
    </div>
  </div>
</section>
