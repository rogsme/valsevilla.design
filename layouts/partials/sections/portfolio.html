<section id="portfolio" class="portfolio-section">
  <div class="wrapper">
    <div class="container">
      <div class="portfolio position-relative">
        <div class="position-relative">
          <div class="headline-portfolio">
            <div class="badge margin-bottom-30">
              <div class="badge-text"><span class="shape-label"></span>My Works</div>
            </div>
            <h2 class="display-2">Each project is crafted with a focus on creating memorable and impactful experiences that connect with users.</h2>
          </div>
          <img src="/images/doodles/doodle-scribble.svg" loading="lazy" alt="" class="doodle-scribble">
          <img src="/images/doodles/doodle-shine-pink.svg" loading="lazy" alt="" class="doodle-shine-pink">
        </div>
        <div class="portfolio-grid">
          {{ range (where site.RegularPages "Section" "projects").ByWeight }}
            <div class="portfolio-item">
              <a href="{{ .RelPermalink }}" class="image-link">
                {{ with .Params.thumbnail }}
                  <img loading="lazy" alt="{{ $.Title }}" src="/images/projects/{{ . }}" class="image-frame">
                {{ end }}
              </a>
              <h3 class="post-title">{{ .Title }}</h3>
              <p>{{ .Params.summary }}</p>
              <a href="{{ .RelPermalink }}" class="btn-link">
                <div>View Case Study</div>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 16 16 12 12 8"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              </a>
            </div>
          {{ end }}
        </div>
        <img src="/images/doodles/doodle-clink.svg" loading="lazy" alt="" class="doodle-clink">
      </div>
    </div>
  </div>
</section>
