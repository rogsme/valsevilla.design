<section id="about" class="section">
  <div class="container">
    <div class="about-grid">
      <div class="about-content">
        <div class="section-header">
          <h2>About me</h2>
        </div>
        <p>{{ site.Params.about.bio }}</p>
        <div class="about-image" style="margin-top: 32px;">
          <img src="/images/portrait.png" alt="{{ site.Params.author }}">
          <div class="experience-badge">{{ site.Params.about.yearsExperience }} Years of Experience</div>
        </div>
        {{ with site.Params.resumeUrl }}
          <a href="{{ . }}" class="btn btn-outline" style="margin-top: 24px;" target="_blank" rel="noopener">Download Resume</a>
        {{ end }}
      </div>
      <div class="timeline">
        <h3 class="timeline-title">Experience</h3>
        {{ range hugo.Data.timeline.entries }}
          <div class="timeline-item">
            <div class="timeline-marker">
              <div class="timeline-dot dot-{{ .dotColor }}"></div>
              <div class="timeline-line"></div>
            </div>
            <div class="timeline-content">
              <div class="timeline-company">{{ .company }}</div>
              <div class="timeline-role">{{ .role }}</div>
              <div class="timeline-period">{{ .period }}</div>
            </div>
          </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
