<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} — {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Params.description | default site.Params.description }}">
  <meta name="author" content="{{ site.Params.author }}">

  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Params.description | default site.Params.description }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  {{ with site.Params.meta.ogImage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

  <meta name="twitter:card" content="summary_large_image">

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="apple-touch-icon" href="/images/webclip.png">

  <!-- Google Fonts: Bricolage Grotesque (display), Hanken Grotesk (body), Shantell Sans (hand), Caveat (scrawl) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=Shantell+Sans:ital,wght@0,400;0,600;1,500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  {{ $style := resources.Get "scss/style.scss" | toCSS (dict "targetPath" "css/style.css" "enableSourceMap" false) }}
  <link rel="stylesheet" href="{{ ($style | minify | fingerprint).RelPermalink }}">

  <!-- Analytics -->
  <script defer src="https://analytics.rogs.me/script.js" data-website-id="d6c98568-82dc-470d-88be-05b9c31c2f6b"></script>
</head>
