<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <p class="footer-copyright">&copy; {{ now.Year }} {{ site.Params.author }}. All rights reserved.</p>
      <div class="footer-social">
        {{ range hugo.Data.social.links }}
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ .name }}">
            {{ .name }}
          </a>
        {{ end }}
      </div>
    </div>
  </div>
</footer>
