<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom">
      <span>&copy; {{ now.Format "2006" }} {{ site.Params.author }} — made with love &lt;3</span>
      <div class="socials">
        {{ range hugo.Data.social.links }}
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .name }}</a>
        {{ end }}
      </div>
    </div>
  </div>
</footer>
