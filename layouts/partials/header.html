<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="site-logo">
        <img src="/images/logo.svg" alt="{{ site.Title }}" width="150">
      </a>

      <nav class="nav-desktop">
        {{ range site.Menus.main }}
          {{ if not .Params.external }}
            <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
          {{ end }}
        {{ end }}
      </nav>

      <div class="navbar-button-wrapper">
        {{ range hugo.Data.social.links }}
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="btn-social btn-3d" aria-label="{{ .name }}">
            <div class="btn-front">
              <img src="/images/social/{{ .icon }}.svg" alt="{{ .name }}" class="social-icon">
            </div>
            <div class="btn-edge"></div>
          </a>
        {{ end }}
      </div>

      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
